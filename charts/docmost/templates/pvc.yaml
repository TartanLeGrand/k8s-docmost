{{- if and (eq (include "docmost.storageDriver" .) "local") .Values.docmost.storage.local.persistence.enabled (eq (default "" .Values.docmost.storage.local.persistence.claimName) "") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "docmost.fullname" . }}-storage
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
spec:
  {{- $pvcName := printf "%s-storage" (include "docmost.fullname" .) }}
  {{- $existing := lookup "v1" "PersistentVolumeClaim" .Release.Namespace $pvcName }}
  {{- /* Preserve accessModes from existing PVC if present to avoid immutable-field changes */}}
  {{- if and $existing $existing.spec.accessModes }}
  accessModes:
  {{- range $existing.spec.accessModes }}
    - {{ . }}
  {{- end }}
  {{- else }}
  accessModes:
    - ReadWriteOnce
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.docmost.storage.local.persistence.size }}
  {{- /* storageClassName: copy from existing if present; only use configured storageClass when creating a new PVC (i.e. when $existing is empty) */}}
  {{- if and $existing $existing.spec.storageClassName }}
  storageClassName: {{ $existing.spec.storageClassName | quote }}
  {{- else if and (not $existing) .Values.docmost.storage.local.persistence.storageClass }}
  storageClassName: {{ .Values.docmost.storage.local.persistence.storageClass | quote }}
  {{- end }}
  {{- /* volumeMode: preserve existing if present, otherwise allow value from chart values */}}
  {{- if and $existing $existing.spec.volumeMode }}
  volumeMode: {{ $existing.spec.volumeMode | quote }}
  {{- else if .Values.docmost.storage.local.persistence.volumeMode }}
  volumeMode: {{ .Values.docmost.storage.local.persistence.volumeMode | quote }}
  {{- end }}
  {{- /* selector: preserve existing if present */}}
  {{- if and $existing $existing.spec.selector }}
  selector:
    {{- toYaml $existing.spec.selector | nindent 4 }}
  {{- end }}
  {{- /* dataSource/dataSourceRef: preserve existing if present */}}
  {{- if and $existing $existing.spec.dataSource }}
  dataSource:
    {{- toYaml $existing.spec.dataSource | nindent 4 }}
  {{- end }}
  {{- if and $existing $existing.spec.dataSourceRef }}
  dataSourceRef:
    {{- toYaml $existing.spec.dataSourceRef | nindent 4 }}
  {{- end }}
  {{- /* volumeAttributesClassName: preserve existing if present (k8s >=1.27) */}}
  {{- if and $existing $existing.spec.volumeAttributesClassName }}
  volumeAttributesClassName: {{ $existing.spec.volumeAttributesClassName | quote }}
  {{- end }}
  {{- /* volumeName: preserve existing to avoid clearing an immutable bound PV reference */}}
  {{- if and $existing $existing.spec.volumeName }}
  volumeName: {{ $existing.spec.volumeName | quote }}
  {{- end }}
{{- end }}
