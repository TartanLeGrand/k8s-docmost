apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docmost.fullname" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "docmost.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "docmost.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "docmost.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.docmost.debug.enabled }}
            - name: debug
              containerPort: {{ .Values.docmost.debug.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: APP_URL
              value: {{ .Values.docmost.appUrl }}
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: appSecret
            - name: REDIS_URL
              value: "redis://{{ include "redis.fullname" $.Subcharts.redis }}:{{ default 6379 .Values.redis.ports.redis.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster.fullname" $.Subcharts.postgresql }}-app
                  key: uri
            {{- if .Values.docmost.smtp.host }}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpHost
            {{- end }}
            {{- if .Values.docmost.smtp.port }}
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpPort
            {{- end }}
            {{- if .Values.docmost.smtp.user }}
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpUser
            {{- end }}
            {{- if .Values.docmost.smtp.pass }}
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpPass
            {{- end }}
            {{- if .Values.docmost.smtp.from }}
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpFrom
            {{- end }}
            {{- if .Values.docmost.smtp.secure }}
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpSecure
            {{- end }}

            - name: STORAGE_DRIVER
              value: "{{ .Values.docmost.storage.driver }}"

            {{- if eq .Values.docmost.storage.driver "local" }}
            - name: STORAGE_PATH
              value: "{{ .Values.docmost.storage.local.mountPath }}"
            {{- end }}

            {{- if eq .Values.docmost.storage.driver "s3" }}
            - name: S3_ENDPOINT
              value: "{{ .Values.docmost.storage.s3.endpoint }}"
            - name: S3_REGION
              value: "{{ .Values.docmost.storage.s3.region }}"
            - name: S3_BUCKET
              value: "{{ .Values.docmost.storage.s3.bucket }}"
            - name: S3_FORCE_PATH_STYLE
              value: "{{ .Values.docmost.storage.s3.forcePathStyle }}"
            {{- if .Values.docmost.storage.s3.secretName }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.docmost.storage.s3.secretName }}
                  key: {{ .Values.docmost.storage.s3.accessKeyKey }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.docmost.storage.s3.secretName }}
                  key: {{ .Values.docmost.storage.s3.secretKeyKey }}
            {{- end }}
            {{- end }}

            {{- if and (eq .Values.docmost.storage.driver "local") .Values.docmost.storage.local.persistence.enabled }}
            - name: STORAGE_PATH
              value: "{{ .Values.docmost.storage.local.mountPath }}"
            {{- end }}

            {{- if and .Values.docmost.debug.enabled (ne .Values.docmost.debug.nodeEnv "") }}
            - name: NODE_ENV
              value: "{{ .Values.docmost.debug.nodeEnv }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and (eq .Values.docmost.storage.driver "local") .Values.docmost.storage.local.persistence.enabled }}
          {{- if not .Values.volumeMounts }}
          volumeMounts:
          {{- end }}
            - name: storage
              mountPath: {{ .Values.docmost.storage.local.mountPath }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and (eq .Values.docmost.storage.driver "local") .Values.docmost.storage.local.persistence.enabled }}
      - name: storage
        persistentVolumeClaim:
          claimName: {{- if .Values.docmost.storage.local.persistence.claimName }}{{ .Values.docmost.storage.local.persistence.claimName }}{{- else }}{{ include "docmost.fullname" . }}-storage{{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
