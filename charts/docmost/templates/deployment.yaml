apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docmost.fullname" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "docmost.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "docmost.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "docmost.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.docmost.debug.enabled }}
            - name: debug
              containerPort: {{ .Values.docmost.debug.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: APP_URL
              value: {{ .Values.docmost.appUrl }}
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: appSecret
            - name: REDIS_URL
              value: "redis://{{ include "redis.fullname" $.Subcharts.redis }}:{{ default 6379 .Values.redis.ports.redis.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cluster.fullname" $.Subcharts.postgresql }}-app
                  key: uri
            {{- if .Values.docmost.smtp.host }}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpHost
            {{- end }}
            {{- if .Values.docmost.smtp.port }}
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpPort
            {{- end }}
            {{- if .Values.docmost.smtp.user }}
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpUser
            {{- end }}
            {{- if .Values.docmost.smtp.pass }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpPass
            {{- end }}
            {{- if .Values.docmost.mail.driver }}
            - name: MAIL_DRIVER
              value: "{{ .Values.docmost.mail.driver }}"
            {{- end }}
            {{- if .Values.docmost.mail.from }}
            - name: MAIL_FROM_ADDRESS
              value: {{ .Values.docmost.mail.from }}
            {{- end }}
            {{- if .Values.docmost.mail.name }}
            - name: MAIL_FROM_NAME
              value: {{ .Values.docmost.mail.name }}
            {{- end }}
            {{- if .Values.docmost.smtp.secure }}
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: smtpSecure
            {{- end }}

            - name: STORAGE_DRIVER
              value: "{{ include "docmost.storageDriver" . }}"

            {{- if eq (include "docmost.storageDriver" .) "local" }}
            - name: STORAGE_PATH
              value: "{{ .Values.docmost.storage.local.mountPath }}"
            {{- end }}

            {{- if and .Values.docmost.debug.enabled (ne .Values.docmost.debug.nodeEnv "") }}
            - name: NODE_ENV
              value: "{{ .Values.docmost.debug.nodeEnv }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* Volume mounts: include any user-provided mounts, and always mount the local storage path when storageDriver=local */}}
          {{- if or .Values.volumeMounts (eq (include "docmost.storageDriver" .) "local") }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if eq (include "docmost.storageDriver" .) "local" }}
            - name: storage
              mountPath: "{{ .Values.docmost.storage.local.mountPath }}"
            {{- end }}
          {{- end }}
      {{- /* Volumes: include any user-provided volumes, and when storageDriver=local create either a PVC or a hostPath */}}
      {{- if or .Values.volumes (eq (include "docmost.storageDriver" .) "local") }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq (include "docmost.storageDriver" .) "local" }}
          {{- if .Values.docmost.storage.local.persistence.enabled }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-storage" (include "docmost.fullname" .)) .Values.docmost.storage.local.persistence.claimName }}
          {{- else }}
        - name: storage
          hostPath:
            path: "{{ .Values.docmost.storage.local.mountPath }}"
            type: DirectoryOrCreate
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
