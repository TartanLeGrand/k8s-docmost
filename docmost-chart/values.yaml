# Default values for docmost.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas for the deployment
replicaCount: 2

image:
  repository: docmost/docmost
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

# Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: docmost.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: docmost-tls
  #    hosts:
  #      - docmost.example.com

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /api/health/live
    port: http
  initialDelaySeconds: 10

readinessProbe:
  httpGet:
    path: /api/health/live
    port: http
  initialDelaySeconds: 10
  failureThreshold: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Strategy for deployment updates
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

# Termination grace period in seconds
terminationGracePeriodSeconds: 130

# Lifecycle hooks
lifecycle:
  preStop:
    exec:
      command: ["sleep", "30s"]

# Docmost application configuration
config:
  # Application URL - must match your domain
  appUrl: "https://docmost.local"
  
  # Storage configuration
  storage:
    driver: "s3"  # Options: s3, local
    fileUploadSizeLimit: "100mb"
  
  # S3 configuration (when storage.driver is "s3")
  s3:
    region: "us-west-1"
    bucket: "files-prod"
    endpoint: "https://s3.us-west-1.amazonaws.com"
    url: "https://s3.us-west-1.amazonaws.com"

# Docmost secrets configuration
secrets:
  # Application secret - minimum 32 characters
  # Generate with: openssl rand -hex 32
  appSecret: "random_app_secret_min_32_chars_34e85903f193bd0da5a"
  
  # Database connection URL
  # Format: postgresql://username:password@host:port/database?schema=public
  databaseUrl: "postgresql://docmost:CHANGE_ME@postgres:5432/docmost?schema=public"
  
  # Redis connection URL
  redisUrl: "redis://redis:6379"
  
  # AWS credentials (when using S3 storage)
  aws:
    accessKeyId: "000000000000000001"
    secretAccessKey: "K000000000000000000000"
  
  # Mail configuration
  mail:
    driver: "smtp"  # Options: smtp
    smtp:
      host: "smtp.example.com"
      port: "587"
      username: "user_here"
      password: "password_here"
      secure: "false"  # Use "true" for TLS
    fromAddress: "hello@example.com"

# ConfigMap and Secret can be disabled if you want to manage them separately
configMap:
  create: true
  name: ""

secret:
  create: true
  name: ""
