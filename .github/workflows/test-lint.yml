name: Lint and Test Charts

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.14.4

      # Evite le crash Yamale/Python: pinner 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
        with:
          version: 3.13.0
          yamllint_version: 1.37.1
          yamale_version: 6.0.0

      - name: Add Helm Repositories
        run: |
          helm repo add pascaliske https://charts.pascaliske.dev
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --check-version-increment=false

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.12.0

      - name: Install and wait for CNPG operator
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm upgrade --install cnpg-operator cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --set crds.create=true \
            --wait --timeout 180s

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          ct install \
            --target-branch ${{ github.event.repository.default_branch }} \
            --helm-extra-args "--timeout 15m --atomic" \
            --debug